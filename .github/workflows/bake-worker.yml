name: bake-worker

# Reproducible bake of the GPU prover image — $0, NO GPU (the GPU is only touched
# at Stop A, the first real prove). Build-in-public: anyone can rebuild the prover
# from CI. Stage 1 (worker/build-host.sh) builds the PRODUCTION host with the
# contract-bound image_id cbeab7aa (the pinned r0.1.88.0 reproducible Docker guest
# build) and ABORTS if the embedded id ≠ cbeab7aa — so a wrong-guest image can never
# be pushed, and the GPU is never reached on a bad build. Stage 2 builds a slim
# runtime image and pushes it to GHCR.
#
# Manual only (workflow_dispatch) — you fire it. Runs on ubuntu-latest (x86, real
# Docker daemon preinstalled — unlike a RunPod pod, which is a container with none).

on:
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  bake:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      # The risc0 + CUDA build is tight on a GH runner (~14 GB free on /). Free
      # ~30 GB of preinstalled toolchains up front (transparent, no 3rd-party action).
      - name: Free disk space
        run: |
          echo "── disk before ──"; df -h / | tail -1
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo docker image prune -af || true
          echo "── disk after ──"; df -h / | tail -1

      - uses: actions/checkout@v4

      # GHCR image names must be lowercase; the owner has mixed case.
      - name: Compute image ref
        run: echo "IMG=ghcr.io/$(echo '${{ github.repository_owner }}' | tr 'A-Z' 'a-z')/sincerin-prover" >> "$GITHUB_ENV"

      # STAGE 1 — build the production host. Verifies image_id == cbeab7aa with
      # `host execute` (CPU executor, no proving, NO GPU). Exits non-zero (fails the
      # job, skips push) if the embedded id is wrong → no GPU spend on a bad guest.
      - name: Stage 1 — build production host (verify cbeab7aa, no GPU)
        run: bash worker/build-host.sh

      # STAGE 2 — slim runtime image that COPYs the verified host (no GPU).
      - name: Stage 2 — build runtime image
        run: docker build -t "$IMG:n8" -t "$IMG:${{ github.sha }}" worker/

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push to GHCR
        run: |
          docker push "$IMG:n8"
          docker push "$IMG:${{ github.sha }}"
          echo "✅ pushed $IMG:n8 (and :${{ github.sha }})"
          echo "Set the RunPod serverless endpoint image to: $IMG:n8"
