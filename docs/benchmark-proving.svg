<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="760" height="360" font-family="ui-sans-serif, system-ui, sans-serif" role="img" aria-label="Off-chain proving time versus batch size N on a log scale: development on CPU (Mac, x86-on-ARM emulation) takes hours and grows with N, while production on a single RTX 3090 GPU proved N=8 in 5 minutes 4 seconds — about 52 times faster."><rect x="0" y="0" width="760" height="360" fill="#ffffff"/><line x1="66" y1="296.0" x2="730" y2="296.0" stroke="#e6e6e6" stroke-width="1"/><text x="56" y="300.0" text-anchor="end" font-size="12" fill="#7a7a7a">1m</text><line x1="66" y1="214.9" x2="730" y2="214.9" stroke="#e6e6e6" stroke-width="1"/><text x="56" y="218.9" text-anchor="end" font-size="12" fill="#7a7a7a">10m</text><line x1="66" y1="151.9" x2="730" y2="151.9" stroke="#e6e6e6" stroke-width="1"/><text x="56" y="155.9" text-anchor="end" font-size="12" fill="#7a7a7a">1h</text><line x1="66" y1="70.8" x2="730" y2="70.8" stroke="#e6e6e6" stroke-width="1"/><text x="56" y="74.8" text-anchor="end" font-size="12" fill="#7a7a7a">10h</text><line x1="66" y1="40" x2="66" y2="296" stroke="#222222" stroke-width="1.5"/><line x1="66" y1="296" x2="730" y2="296" stroke="#222222" stroke-width="1.5"/><line x1="105.1" y1="296" x2="105.1" y2="301" stroke="#222222" stroke-width="1"/><text x="105.1" y="316" text-anchor="middle" font-size="12" fill="#7a7a7a">2</text><line x1="222.2" y1="296" x2="222.2" y2="301" stroke="#222222" stroke-width="1"/><text x="222.2" y="316" text-anchor="middle" font-size="12" fill="#7a7a7a">8</text><line x1="378.5" y1="296" x2="378.5" y2="301" stroke="#222222" stroke-width="1"/><text x="378.5" y="316" text-anchor="middle" font-size="12" fill="#7a7a7a">16</text><line x1="690.9" y1="296" x2="690.9" y2="301" stroke="#222222" stroke-width="1"/><text x="690.9" y="316" text-anchor="middle" font-size="12" fill="#7a7a7a">32</text><text x="398.0" y="346" text-anchor="middle" font-size="12.5" fill="#222222">batch size · N withdrawals</text><line x1="105.1" y1="144.5" x2="222.2" y2="99.4" stroke="#222222" stroke-width="2.4"/><line x1="222.2" y1="99.4" x2="378.5" y2="73.3" stroke="#222222" stroke-width="2.4" stroke-dasharray="5 4"/><line x1="378.5" y1="73.3" x2="690.9" y2="47.0" stroke="#222222" stroke-width="2.4" stroke-dasharray="5 4"/><circle cx="105.1" cy="144.5" r="4.5" fill="#222222"/><circle cx="222.2" cy="99.4" r="4.5" fill="#222222"/><circle cx="378.5" cy="73.3" r="4.5" fill="#ffffff" stroke="#222222" stroke-width="2"/><circle cx="690.9" cy="47.0" r="4.5" fill="#ffffff" stroke="#222222" stroke-width="2"/><text x="690.9" y="37.0" text-anchor="end" font-size="12.5" fill="#7a7a7a">CPU · development (Mac)</text><circle cx="222.2" cy="238.9" r="6.5" fill="#222222"/><circle cx="222.2" cy="238.9" r="11" fill="none" stroke="#222222" stroke-width="1.4"/><text x="238.2" y="230.9" font-size="13" font-weight="700" fill="#222222">production GPU · 5m 04s</text><text x="238.2" y="246.9" font-size="11.5" fill="#7a7a7a">RTX 3090 · ~52× faster than the Mac at N=8</text><circle cx="80" cy="42" r="4" fill="#222222"/><text x="90" y="46" font-size="11.5" fill="#7a7a7a">measured</text><circle cx="162" cy="42" r="4" fill="#ffffff" stroke="#222222" stroke-width="2"/><text x="172" y="46" font-size="11.5" fill="#7a7a7a">projected</text></svg>